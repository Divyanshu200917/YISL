<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Space & Earth VR Experience</title>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
    <script>
      // Earth environment data
      const earthEnvs = [
        { id: 'forest', name: 'Forest', color: '#228B22', desc: 'A lush green forest with tall trees and birds.' },
        { id: 'desert', name: 'Desert', color: '#EDC9Af', desc: 'A vast desert with dunes and a hot sun.' },
        { id: 'arctic', name: 'Arctic', color: '#B0E0E6', desc: 'A cold arctic with snow and icebergs.' },
        { id: 'city', name: 'City', color: '#A9A9A9', desc: 'A bustling city with skyscrapers and lights.' }
      ];

      // Galaxy data (simplified)
      const stars = [
        { id: 'sol', name: 'Sun (Sol)', color: '#FFD700', planets: [
          { id: 'earth', name: 'Earth', color: '#1e90ff', habitable: true },
          { id: 'mars', name: 'Mars', color: '#c1440e', habitable: false },
          { id: 'jupiter', name: 'Jupiter', color: '#e3aa6f', habitable: false }
        ] },
        { id: 'alpha-centauri', name: 'Alpha Centauri', color: '#fffacd', planets: [
          { id: 'ac-b', name: 'AC-B', color: '#b0c4de', habitable: false }
        ] }
      ];

      // Register a component for clickable interaction
      AFRAME.registerComponent('clickable', {
        init: function () {
          this.el.addEventListener('mouseenter', () => this.el.setAttribute('scale', '1.2 1.2 1.2'));
          this.el.addEventListener('mouseleave', () => this.el.setAttribute('scale', '1 1 1'));
        }
      });

      // Scene logic
      document.addEventListener('DOMContentLoaded', function () {
        // Earth environment selection
        earthEnvs.forEach((env, i) => {
          const btn = document.querySelector(`#earth-btn-${env.id}`);
          btn.addEventListener('click', () => {
            document.querySelector('#earth-env-title').setAttribute('value', env.name);
            document.querySelector('#earth-env-desc').setAttribute('value', env.desc);
            document.querySelector('#earth-env-bg').setAttribute('color', env.color);
          });
        });

        // Galaxy star selection
        stars.forEach((star, i) => {
          const starBtn = document.querySelector(`#star-btn-${star.id}`);
          starBtn.addEventListener('click', () => {
            // Hide all solar systems
            document.querySelectorAll('.solar-system').forEach(e => e.setAttribute('visible', 'false'));
            // Show selected solar system
            document.querySelector(`#solar-${star.id}`).setAttribute('visible', 'true');
          });
        });

        // Planet info
        stars.forEach(star => {
          star.planets.forEach(planet => {
            const planetBtn = document.querySelector(`#planet-btn-${planet.id}`);
            if (planetBtn) {
              planetBtn.addEventListener('click', () => {
                document.querySelector('#planet-info-title').setAttribute('value', planet.name);
                document.querySelector('#planet-info-desc').setAttribute('value', planet.habitable ? 'Habitable planet.' : 'Inhabitable planet.');
                document.querySelector('#planet-info-bg').setAttribute('color', planet.color);
                document.querySelector('#planet-info-panel').setAttribute('visible', 'true');
              });
            }
          });
        });
        // Close planet info
        document.querySelector('#close-planet-info').addEventListener('click', () => {
          document.querySelector('#planet-info-panel').setAttribute('visible', 'false');
        });
      });
    </script>
  </head>
  <body>
    <a-scene>
      <!-- Earth Experience Module -->
      <a-entity id="earth-experience" position="-8 1.5 -8">
        <a-sky id="earth-env-bg" color="#228B22"></a-sky>
        <a-plane position="0 0 -4" rotation="-90 0 0" width="8" height="8" color="#7BC8A4"></a-plane>
        <a-text id="earth-env-title" value="Forest" color="#fff" position="0 3 -4" align="center" width="6"></a-text>
        <a-text id="earth-env-desc" value="A lush green forest with tall trees and birds." color="#fff" position="0 2.5 -4" align="center" width="6"></a-text>
        <!-- Earth environment buttons -->
        <a-entity position="0 1.2 -3.5">
          <a-box id="earth-btn-forest" clickable color="#228B22" position="-3 0 0" width="1" height="0.5" depth="0.5"></a-box>
          <a-text value="Forest" color="#fff" position="-3 0.4 0.3" width="2"></a-text>
          <a-box id="earth-btn-desert" clickable color="#EDC9Af" position="-1 0 0" width="1" height="0.5" depth="0.5"></a-box>
          <a-text value="Desert" color="#fff" position="-1 0.4 0.3" width="2"></a-text>
          <a-box id="earth-btn-arctic" clickable color="#B0E0E6" position="1 0 0" width="1" height="0.5" depth="0.5"></a-box>
          <a-text value="Arctic" color="#333" position="1 0.4 0.3" width="2"></a-text>
          <a-box id="earth-btn-city" clickable color="#A9A9A9" position="3 0 0" width="1" height="0.5" depth="0.5"></a-box>
          <a-text value="City" color="#fff" position="3 0.4 0.3" width="2"></a-text>
        </a-entity>
      </a-entity>

      <!-- Galaxy Exploration Module -->
      <a-entity id="galaxy-experience" position="8 1.5 -8">
        <a-sky color="#000010"></a-sky>
        <a-entity id="milkyway-galaxy">
          <a-text value="Milky Way Galaxy" color="#FFD700" position="0 3 -4" align="center" width="8"></a-text>
          <!-- Star selection -->
          <a-entity position="0 2 -4">
            <a-sphere id="star-btn-sol" clickable color="#FFD700" position="-2 0 0" radius="0.4"></a-sphere>
            <a-text value="Sun" color="#fff" position="-2 0.6 0.2" width="2"></a-text>
            <a-sphere id="star-btn-alpha-centauri" clickable color="#fffacd" position="2 0 0" radius="0.4"></a-sphere>
            <a-text value="Alpha Centauri" color="#fff" position="2 0.6 0.2" width="3"></a-text>
          </a-entity>
          <!-- Solar systems (hidden by default, shown on star select) -->
          <a-entity id="solar-sol" class="solar-system" visible="false">
            <a-text value="Solar System" color="#FFD700" position="0 1.5 -2" align="center" width="6"></a-text>
            <a-sphere id="planet-btn-earth" clickable color="#1e90ff" position="-1 1.2 -2" radius="0.25"></a-sphere>
            <a-text value="Earth" color="#fff" position="-1 1.6 -1.7" width="2"></a-text>
            <a-sphere id="planet-btn-mars" clickable color="#c1440e" position="0 1.1 -2" radius="0.18"></a-sphere>
            <a-text value="Mars" color="#fff" position="0 1.5 -1.7" width="2"></a-text>
            <a-sphere id="planet-btn-jupiter" clickable color="#e3aa6f" position="1 1.3 -2" radius="0.35"></a-sphere>
            <a-text value="Jupiter" color="#fff" position="1 1.7 -1.7" width="2"></a-text>
          </a-entity>
          <a-entity id="solar-alpha-centauri" class="solar-system" visible="false">
            <a-text value="Alpha Centauri System" color="#FFD700" position="0 1.5 -2" align="center" width="6"></a-text>
            <a-sphere id="planet-btn-ac-b" clickable color="#b0c4de" position="0 1.2 -2" radius="0.22"></a-sphere>
            <a-text value="AC-B" color="#fff" position="0 1.6 -1.7" width="2"></a-text>
          </a-entity>
        </a-entity>
      </a-entity>

      <!-- Planet Info Panel -->
      <a-entity id="planet-info-panel" visible="false" position="0 2 -3">
        <a-plane id="planet-info-bg" width="3.5" height="2.2" color="#222" opacity="0.95"></a-plane>
        <a-text id="planet-info-title" value="" color="#FFD700" width="3" position="0 0.7 0"></a-text>
        <a-text id="planet-info-desc" value="" color="#fff" width="3.2" position="0 0 0" wrap-count="40"></a-text>
        <a-box id="close-planet-info" position="1.5 0.8 0.1" width="0.3" height="0.3" depth="0.1" color="#c00" clickable></a-box>
        <a-text value="X" color="#fff" width="0.5" position="1.5 0.8 0.2"></a-text>
      </a-entity>

      <!-- Camera and Cursor -->
      <a-entity camera look-controls wasd-controls position="0 1.6 0" raycaster="objects: [clickable]">
        <a-cursor color="#FFD700" fuse="true"></a-cursor>
      </a-entity>
    </a-scene>
  </body>
</html>
