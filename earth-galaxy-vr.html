<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>VR Earth & Galaxy Explorer</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://unpkg.com/aframe-environment-component@1.3.3/dist/aframe-environment-component.min.js"></script>

  <script>
    AFRAME.registerComponent('scene-controller', {
      init: function () {
        // UI Buttons
        const btnSpace = document.querySelector('#btn-space');
        const btnForest = document.querySelector('#btn-forest');
        const btnVolcano = document.querySelector('#btn-volcano');

        // Environments
        const earthEnv = document.querySelector('#earth-environment');
        const spaceEnv = document.querySelector('#space-environment');
        const mainSky = document.querySelector('#main-sky');

        // Switch to Space
        btnSpace.addEventListener('click', () => {
          earthEnv.setAttribute('visible', 'false');
          spaceEnv.setAttribute('visible', 'true');
          mainSky.setAttribute('color', '#020014'); // Deep space blue/black
        });

        // Switch to Earth: Forest
        btnForest.addEventListener('click', () => {
          earthEnv.setAttribute('visible', 'true');
          earthEnv.setAttribute('environment', 'preset: forest');
          spaceEnv.setAttribute('visible', 'false');
          mainSky.setAttribute('color', '#87CEEB'); // Sky blue
        });

        // Switch to Earth: Volcano
        btnVolcano.addEventListener('click', () => {
          earthEnv.setAttribute('visible', 'true');
          earthEnv.setAttribute('environment', 'preset: volcano');
          spaceEnv.setAttribute('visible', 'false');
          mainSky.setAttribute('color', '#87CEEB');
        });

        // Interactive Planets Logic
        const planets = document.querySelectorAll('.planet');
        const infoBoard = document.querySelector('#planet-info');
        
        planets.forEach(planet => {
          planet.addEventListener('click', function() {
            const name = this.getAttribute('data-name');
            const type = this.getAttribute('data-type');
            infoBoard.setAttribute('text', `value: Target: ${name}\nType: ${type}; color: white; align: center; width: 3`);
          });
        });
      }
    });
  </script>
</head>
<body>

  <a-scene scene-controller cursor="rayOrigin: mouse">
    
    <a-assets>
      <a-mixin id="btn" geometry="primitive: plane; width: 1.5; height: 0.5" 
               material="color: #333; opacity: 0.8" 
               text="color: white; align: center; width: 4"
               animation__hover="property: material.color; to: #555; startEvents: mouseenter; dur: 200"
               animation__leave="property: material.color; to: #333; startEvents: mouseleave; dur: 200"
               animation__click="property: scale; to: 0.9 0.9 0.9; startEvents: click; dur: 100; dir: alternate; loop: 1">
      </a-mixin>
    </a-assets>

    <a-entity position="0 1.6 0">
      <a-camera>
        <a-cursor raycaster="objects: .clickable" color="#FFF" 
                  animation__click="property: scale; startEvents: click; from: 0.1 0.1 0.1; to: 1 1 1; dur: 150">
        </a-cursor>
      </a-camera>
    </a-entity>

    <a-sky id="main-sky" color="#87CEEB" transition="color 2000ms"></a-sky>

    <a-entity position="0 1.5 -3">
      <a-entity id="btn-forest" mixin="btn" class="clickable" text="value: Earth: Forest" position="-1.7 0 0"></a-entity>
      <a-entity id="btn-volcano" mixin="btn" class="clickable" text="value: Earth: Volcano" position="0 0 0"></a-entity>
      <a-entity id="btn-space" mixin="btn" class="clickable" text="value: Milky Way Galaxy" position="1.7 0 0"></a-entity>
    </a-entity>

    <a-entity id="earth-environment" environment="preset: forest; skyType: atmosphere; lighting: distant" visible="true"></a-entity>

    <a-entity id="space-environment" visible="false">
      
      <a-entity star-system="count: 1000; radius: 250; depth: 0"></a-entity>

      <a-entity id="planet-info" position="0 2.5 -4" text="value: Select a celestial body...; color: white; align: center; width: 4"></a-entity>

      <a-entity position="0 1 -8">
        
        <a-sphere class="clickable planet" data-name="The Sun" data-type="Yellow Dwarf Star" 
                  radius="2" color="#FDB813" material="shader: flat"
                  animation__pulse="property: scale; to: 1.05 1.05 1.05; dir: alternate; loop: true; dur: 2000">
          <a-light type="point" color="#FFF" intensity="2" distance="50"></a-light>
        </a-sphere>

        <a-entity animation="property: rotation; to: 0 360 0; loop: true; dur: 15000; easing: linear">
          <a-sphere class="clickable planet" data-name="Terra Nova" data-type="Habitable Planet"
                    position="4 0 0" radius="0.5" color="#2E8B57"
                    animation__hover="property: scale; to: 1.3 1.3 1.3; startEvents: mouseenter; dur: 200"
                    animation__leave="property: scale; to: 1 1 1; startEvents: mouseleave; dur: 200">
            <a-entity animation="property: rotation; to: 0 360 0; loop: true; dur: 3000; easing: linear">
              <a-sphere position="0.8 0 0" radius="0.1" color="#CCC"></a-sphere>
            </a-entity>
          </a-sphere>
        </a-entity>

        <a-entity animation="property: rotation; to: 0 360 0; loop: true; dur: 25000; easing: linear">
          <a-sphere class="clickable planet" data-name="Crimson Giant" data-type="Inhabitable Gas Giant"
                    position="7 0 0" radius="1.2" color="#DC143C"
                    animation__hover="property: scale; to: 1.2 1.2 1.2; startEvents: mouseenter; dur: 200"
                    animation__leave="property: scale; to: 1 1 1; startEvents: mouseleave; dur: 200">
             <a-ring color="#FFA07A" radius-inner="1.5" radius-outer="2" rotation="-70 0 0" material="side: double; opacity: 0.7"></a-ring>
          </a-sphere>
        </a-entity>

      </a-entity>
    </a-entity>

  </a-scene>
</body>
</html>
